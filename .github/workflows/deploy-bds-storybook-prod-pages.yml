name: deploy-bds-storybook-prod-pages

on:
  push:
    branches:
      - main
    paths:
      - "packages/react/**"
      - "packages/icons/**"
      - "packages/design-tokens/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-bds-storybook-prod-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: deploy-bds-storybook-prod-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook:react

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./packages/react/storybook-static --project-name=bds-storybook --branch=main --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}
