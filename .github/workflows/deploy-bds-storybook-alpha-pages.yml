name: deploy-bds-storybook-alpha-pages

on:
  push:
    branches:
      - "**"
      - "!main"
    paths:
      - "packages/react/**"
      - "packages/icons/**"
      - "packages/design-tokens/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-bds-storybook-alpha-pages.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    name: deploy-bds-storybook-alpha-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook:react

      - name: Deploy to Cloudflare Pages (Alpha)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./packages/react/storybook-static --project-name=bds-storybook --branch=${{ github.ref_name }} --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}

      - name: Find related PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            if (!context.ref.startsWith('refs/heads/')) {
              core.setOutput('number', '');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 1,
            });

            core.setOutput('number', pulls.data[0] ? String(pulls.data[0].number) : '');

      - name: Upsert PR preview comment
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PREVIEW_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          PREVIEW_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = '<!-- bds-preview:storybook -->';
            const aliasUrl = (process.env.PREVIEW_ALIAS_URL || '').trim();
            const deploymentUrl = (process.env.PREVIEW_DEPLOYMENT_URL || '').trim();

            const body = [
              marker,
              '## 🚀 Storybook Preview',
              '',
              `- **Branch Preview**: ${aliasUrl || '(not available)'}`,
              `- **Deployment URL**: ${deploymentUrl || '(not available)'}`,
              `- **Commit**: \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
